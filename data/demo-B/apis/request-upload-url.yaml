id: request-upload-url
method: POST
path: /api/v1/uploads
component: api
description: Issue a pre-signed object-storage URL so the caller can PUT an image directly. Returns an upload_id for later confirmation.
auth: api_key
code_ref: internal/router/handler_uploads.go#RequestUploadURL

middleware_pipeline: authenticated
middlewares:
  - id: cors
  - id: request-id
  - id: request-logger
  - id: api-key-auth

request:
  content_type: application/json
  fields:
    - name: content_type
      type: string
      required: true
      enum: [image/jpeg, image/png, image/webp]
    - name: size_bytes
      type: int
      required: true
      validation: "1 - 10_485_760 (10 MB)"

response:
  - status: 201
    schema_ref: internal/router/payload/uploads.go#UploadSessionResponse
    fields:
      - name: upload_id
        type: string
        description: Use this in the signed-webhook callback after PUT completes
      - name: upload_url
        type: string
        description: Pre-signed PUT URL; valid for 15 minutes
      - name: object_key
        type: string
        description: "Target storage key (e.g. uploads/<uuid>.jpg)"
      - name: expires_at
        type: string
        description: ISO8601 timestamp — upload_url becomes invalid after this
  - status: 400
    error_code: INVALID_SIZE
  - status: 401
    error_code: AUTH_INVALID_KEY

steps:
  - order: 1
    action: bind_json_body
  - order: 2
    action: validate_size
    rule: "size_bytes within 1..10 MB"
  - order: 3
    action: generate_object_key
    rule: "uploads/<uuid>.<ext>"
    code_ref: internal/app/service/upload_service.go#GenerateKey
  - order: 4
    action: sign_put_url
    target: integration:object-storage
    rule: "15-minute validity"
    code_ref: internal/adapter/objectstorage/client.go#SignWrite
  - order: 5
    action: insert_row
    target: table:upload_session
    rule: "INSERT INTO upload_session (id, source_path, expires_at) VALUES (...)"
    code_ref: internal/adapter/repository/postgres/upload_session_repo.go#Insert
  - order: 6
    action: respond
    body: UploadSessionResponse
    status: 201

sequence_mermaid: |
  sequenceDiagram
    participant C as Client
    participant A as api
    participant S as object-storage
    participant U as upload_session table
    C->>A: POST /api/v1/uploads
    A->>A: cors + request-id + api-key-auth
    A->>A: validate size_bytes 1..10 MB
    A->>A: generate object_key uploads/<uuid>.<ext>
    A->>S: sign_put_url 15-minute validity
    S-->>A: signed PUT URL
    A->>U: INSERT upload_session (id, source_path, expires_at)
    U-->>A: row
    A-->>C: 201 + UploadSessionResponse

uses:
  tables: [upload_session]
  topics_produced: []
  topics_consumed: []
  integrations: [object-storage]
