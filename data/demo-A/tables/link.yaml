id: link
database: postgres
description: One row per short link — slug, target URL, owner (caller), optional preview image id.
migration_ref: migrations/001_create_link.up.sql
model_code_ref: internal/domain/link.go#Link
repo_code_ref: internal/adapter/repository/postgres/link_repo.go
columns:
  - name: id
    type: BIGSERIAL
    primary_key: true
  - name: slug
    type: TEXT
    nullable: false
    description: "User-visible short code"
  - name: target_url
    type: TEXT
    nullable: false
  - name: owner_key
    type: TEXT
    nullable: false
    description: "API key hash of the caller who created the link"
  - name: preview_image_id
    type: TEXT
    nullable: true
    description: "ID of the thumbnail generated by demo-B; null if preview not ready"
  - name: status
    type: TEXT
    nullable: false
    default: "'active'"
    enum: [active, disabled, deleted]
  - name: click_count
    type: BIGINT
    nullable: false
    default: "0"
    description: "Aggregated by the link-click-aggregator worker"
  - name: created_at
    type: TIMESTAMPTZ
    nullable: false
    default: "NOW()"
indexes:
  - name: pk_link
    columns: [id]
    unique: true
    type: primary_key
  - name: idx_link_slug_unique
    columns: [slug]
    unique: true
  - name: idx_link_owner_created
    columns: [owner_key, created_at]
