id: list-top-links
version: v1
status: deprecated
replaced_by: v2
method: GET
path: /api/v1/stats/top
component: api
description: Return the top N most-clicked links over the past 7 days. Caller-scoped — only returns links owned by the authenticated API key. (Legacy — v2 adds configurable time window and cursor pagination.)
auth: api_key
code_ref: internal/router/handler_stats.go#ListTopLinks

middleware_pipeline: authenticated
middlewares:
  - id: cors
  - id: request-id
  - id: request-logger
  - id: api-key-auth
  - id: rate-limit

request:
  content_type: application/json
  fields:
    - name: limit
      type: int
      required: false
      validation: "1-100, default 20"

response:
  - status: 200
    schema_ref: internal/router/payload/stats.go#TopLinksResponse
    fields:
      - name: links
        type: array<object>
        description: "Ordered by click_count desc; each { slug, target_url, click_count, created_at }"
      - name: window_days
        type: int
        description: Always 7 for this endpoint
  - status: 401
    error_code: AUTH_INVALID_KEY

steps:
  - order: 1
    action: parse_limit
  - order: 2
    action: list_top_links
    target: table:link
    rule: "SELECT ... FROM link WHERE owner_key = ? ORDER BY click_count DESC LIMIT ?"
    code_ref: internal/adapter/repository/postgres/link_repo.go#ListTopByOwner
  - order: 3
    action: respond
    body: TopLinksResponse
    status: 200

sequence_mermaid: |
  sequenceDiagram
    participant C as Client
    participant A as api
    participant L as link table
    C->>A: GET /api/v1/stats/top?limit=20
    A->>A: cors + request-id + api-key-auth + rate-limit
    A->>L: list_top_links owner_key limit (fixed 7d window)
    L-->>A: rows (click_count desc)
    A-->>C: 200 + TopLinksResponse

uses:
  tables: [link]
  topics_produced: []
  topics_consumed: []
  integrations: []
