id: list-top-links
version: v2
status: active
method: GET
path: /api/v2/stats/top
component: api
description: Return the top most-clicked links over a configurable time window with cursor-based pagination. Caller-scoped — only returns links owned by the authenticated API key.
auth: api_key
code_ref: internal/router/handler_stats.go#ListTopLinksV2

middleware_pipeline: authenticated
middlewares:
  - id: cors
  - id: request-id
  - id: request-logger
  - id: api-key-auth
  - id: rate-limit

request:
  content_type: application/json
  fields:
    - name: limit
      type: int
      required: false
      validation: "1-100, default 20"
    - name: window_days
      type: int
      required: false
      validation: "1, 7, 30; default 7"
    - name: cursor
      type: string
      required: false
      validation: "opaque cursor returned by previous page; omit for first page"

response:
  - status: 200
    schema_ref: internal/router/payload/stats.go#TopLinksResponseV2
    fields:
      - name: links
        type: array<object>
        description: "Ordered by click_count desc; each { slug, target_url, click_count, created_at, last_click_at }"
      - name: window_days
        type: int
        description: Echoes the requested window (1 / 7 / 30)
      - name: next_cursor
        type: string
        nullable: true
        description: Opaque cursor for next page; null when no more pages
  - status: 400
    error_code: PARAMETER_INVALID
    note: window_days outside {1,7,30} or cursor malformed
  - status: 401
    error_code: AUTH_INVALID_KEY

steps:
  - order: 1
    action: parse_query_params
  - order: 2
    action: validate_window
    rule: "window_days ∈ {1, 7, 30}"
    code_ref: internal/router/handler_stats.go#validateWindow
  - order: 3
    action: decode_cursor
    rule: opaque base64 → (last_click_count, last_slug)
  - order: 4
    action: list_top_links
    target: table:link
    rule: "SELECT ... FROM link WHERE owner_key = $1 AND last_click_at >= now() - $2::interval ORDER BY click_count DESC, slug ASC LIMIT $3 OFFSET keyset-from-cursor"
    code_ref: internal/adapter/repository/postgres/link_repo.go#ListTopByOwnerWindowed
  - order: 5
    action: encode_next_cursor
    rule: last row's (click_count, slug) → base64
  - order: 6
    action: respond
    body: TopLinksResponseV2
    status: 200

sequence_mermaid: |
  sequenceDiagram
    participant C as Client
    participant A as api
    participant L as link table
    C->>A: GET /api/v2/stats/top?limit=20&window_days=30&cursor=...
    A->>A: cors + request-id + api-key-auth + rate-limit
    A->>A: validate window_days ∈ {1,7,30}
    A->>A: decode opaque cursor → (click_count, slug)
    A->>L: list_top_links owner_key window_days limit
    L-->>A: rows (click_count desc, slug asc)
    A->>A: encode next_cursor (null if last page)
    A-->>C: 200 + TopLinksResponseV2

uses:
  tables: [link]
  topics_produced: []
  topics_consumed: []
  integrations: []
