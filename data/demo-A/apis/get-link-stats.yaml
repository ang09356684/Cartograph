id: get-link-stats
method: GET
path: /api/v1/stats/:slug
component: api
description: Return aggregated click stats for a single slug — total, last-24h, top referrers.
auth: api_key
code_ref: internal/router/handler_stats.go#GetLinkStats

middleware_pipeline: authenticated
middlewares:
  - id: cors
  - id: request-id
  - id: request-logger
  - id: api-key-auth
  - id: rate-limit

request:
  path_params:
    - name: slug
      type: string
      required: true

response:
  - status: 200
    schema_ref: internal/router/payload/stats.go#LinkStatsResponse
    fields:
      - name: slug
        type: string
      - name: total_clicks
        type: int64
      - name: last_24h_clicks
        type: int64
      - name: top_referrers
        type: array<object>
        description: "Top 5 referrers, each { referrer_host, count }"
      - name: hourly_buckets
        type: array<object>
        description: "Past 24 hours bucketed; each { hour (ISO8601), count }"
  - status: 404
    error_code: SLUG_NOT_FOUND
  - status: 401
    error_code: AUTH_INVALID_KEY

steps:
  - order: 1
    action: get_link_by_slug
    target: table:link
    code_ref: internal/adapter/repository/postgres/link_repo.go#FindBySlug
  - order: 2
    action: aggregate_clicks
    target: table:click_event
    rule: "SELECT COUNT(*), date_trunc('hour', occurred_at) ... WHERE link_id = ? GROUP BY ..."
    code_ref: internal/adapter/repository/postgres/click_event_repo.go#AggregateByLink
  - order: 3
    action: respond
    body: LinkStatsResponse
    status: 200

sequence_mermaid: |
  sequenceDiagram
    participant C as Client
    participant A as api
    participant L as link table
    participant E as click_event table
    C->>A: GET /api/v1/stats/:slug
    A->>A: cors + request-id + api-key-auth + rate-limit
    A->>L: get link by slug
    alt slug not found
      L-->>A: 0 rows
      A-->>C: 404 SLUG_NOT_FOUND
    else found
      L-->>A: link row
      A->>E: aggregate clicks by link_id (total / 24h / hourly / top referrers)
      E-->>A: aggregates
      A-->>C: 200 + LinkStatsResponse
    end

uses:
  tables: [link, click_event]
  topics_produced: []
  topics_consumed: []
  integrations: []
